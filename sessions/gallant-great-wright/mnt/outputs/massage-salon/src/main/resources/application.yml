spring:
  application:
    name: massage-salon

  datasource:
    url: jdbc:postgresql://localhost:5432/massage_salon
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway управляет схемой, Hibernate только валидирует
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

# JWT настройки
app:
  jwt:
    secret: your-super-secret-key-minimum-256-bits-long-change-in-production
    expiration-ms: 86400000   # 24 часа

  # Telegram Bot (заполнить после создания бота через @BotFather)
  telegram:
    bot-name: your_bot_name
    bot-token: your_bot_token

logging:
  level:
    com.salon: DEBUG
    org.springframework.security: INFO
